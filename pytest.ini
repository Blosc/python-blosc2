[pytest]
addopts = --doctest-modules -m "not network and not heavy"
testpaths =
    tests
    blosc2/core.py
    blosc2/ndarray.py
    blosc2/schunk.py

markers =
    heavy: tests that take long time to complete.
    network: tests that require network access.
    tui: b2view Textual UI tests; each one boots a headless app session.

filterwarnings =
    error
    ignore::UserWarning
